<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amunì - L'Essenza di Caccamo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap');

/* Reset e Sfondo Base */
html, body { height: 100%; margin: 0; padding: 0; }
body {
    font-family: 'Fredoka', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #fff;
    min-height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('Sfondo home.jpg') no-repeat center center fixed;
    background-size: cover;
    transition: background 0.5s ease;
}

/* Header */
.header-home { text-align: center; margin: 40px 0 20px 0; }
.titolo-amuni { font-size: 4.5rem; color: #FFDE59; -webkit-text-stroke: 2px #333; text-shadow: 8px 8px 0px #333; margin: 0; }
.sottotitolo { text-shadow: 2px 2px 4px #000; font-weight: bold; margin-top: 10px; }

/* Bento Grid */
.bento-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px;
    width: 90%; max-width: 500px; margin-top: 20px;
}
.bento-item {
    border: 4px solid #333; border-radius: 28px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-decoration: none;
    color: #333 !important; font-weight: 700; background: white; cursor: pointer;
    box-shadow: 8px 8px 0px #333; height: 100px;
}
.item-large { grid-row: span 2; height: 215px; font-size: 1.2rem; }
.item-wide { grid-column: span 2; height: 100px; flex-direction: row; gap: 10px; }

/* Colori */
.siti { background: #FFDE59 !important; }
.eventi { background: #FF914D !important; }
.mangiare { background: #FF5757 !important; }
.tradizioni { background: #7ED957 !important; }
.trasporti { background: #5CE1E6 !important; }
.dormire { background: #BD97FF !important; }

/* Sezioni */
.section { 
    display: none; width: 90%; max-width: 550px; background: rgba(255,255,255,0.95); 
    color: #333; border-radius: 30px; padding: 25px; margin: 20px 0; border: 4px solid #333;
}
.active { display: block; animation: fadeIn 0.4s; }
.section img { width: 100%; border-radius: 20px; margin: 15px 0; border: 2px solid #333; }
.btn-back { background: #333; color: white; border: none; padding: 15px; width: 100%; border-radius: 15px; font-weight: bold; margin-top: 20px; cursor: pointer; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div id="home-content">
    <div class="header-home">
        <h1 class="titolo-amuni">AMUNÌ</h1>
        <p class="sottotitolo">L'ESSENZA DI CACCAMO</p>
    </div>

    <div class="bento-grid">
        <div onclick="showSection('siti-page', 'Sfondo Chiese.png')" class="bento-item item-large siti">🏰 Siti</div>
        <div onclick="showSection('eventi-page', 'Sfondo eventi.png')" class="bento-item eventi">🎉 Eventi</div>
        <div onclick="showSection('food-page', 'Sfondo food.png')" class="bento-item mangiare">🍝 Food</div>
        <div onclick="showSection('tradizioni-page', 'Sfondo Chiese.png')" class="bento-item item-wide tradizioni">🙏 Tradizioni Locali</div>
        <div onclick="showSection('info-page', 'Sfondo home.jpg')" class="bento-item trasporti">🚌 Vai</div>
        <div onclick="showSection('info-page', 'Sfondo home.jpg')" class="bento-item dormire">🛌 Sleep</div>
    </div>
</div>

<div id="siti-page" class="section">
    <h2>🏰 Siti Monumentali</h2>
    <img src="Layout monumenti.jpg">
    <video width="100%" controls style="border-radius:15px; border:2px solid #333;">
        <source src="Video Castellana.mp4" type="video/mp4">
    </video>
    <img src="Chiesa Madre.jpg">
    <img src="Chiesa Madre 2.jpg">
    <img src="Chiesa Annunziata.jpg">
    <img src="Sepolcro Annunziata.jpg">
    <img src="Chiesa Badia.jpg">
    <img src="Maioliche Badia.jpg">
    <img src="Soffitto San Domenico.jpg">
    <button class="btn-back" onclick="goHome()">🏠 TORNA ALLA HOME</button>
</div>

<div id="tradizioni-page" class="section">
    <h2>🙏 Tradizioni</h2>
    <img src="Beato Giovanni.jpg">
    <p>La fede e la storia di Caccamo.</p>
    <button class="btn-back" onclick="goHome()">🏠 TORNA ALLA HOME</button>
</div>

<div id="eventi-page" class="section"><h2>🎉 Eventi</h2><img src="Sfondo eventi.png"><button class="btn-back" onclick="goHome()">🏠 HOME</button></div>
<div id="food-page" class="section"><h2>🍝 Food</h2><img src="Sfondo food.png"><button class="btn-back" onclick="goHome()">🏠 HOME</button></div>
<div id="info-page" class="section"><h2>🚌 Info</h2><p>Dettagli sui trasporti e accoglienza.</p><button class="btn-back" onclick="goHome()">🏠 HOME</button></div>

<script>
function showSection(id, bg) {
    document.getElementById('home-content').style.display = 'none';
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.body.style.background = "linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('" + bg + "') no-repeat center center fixed";
    document.body.style.backgroundSize = "cover";
}

function goHome() {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('home-content').style.display = 'block';
    document.body.style.background = "linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('Sfondo home.jpg') no-repeat center center fixed";
    document.body.style.backgroundSize = "cover";
}
</script>

<script type="text/javascript">
(function(d, t) {
    var v = d.createElement(t), s = d.getElementsByTagName(t)[0];
    v.onload = function() {
        window.voiceflow.chat.load({
            verify: { projectID: '69688b21e8ee3a8419cbf2a7' },
            url: 'https://general-runtime.voiceflow.com',
            versionID: 'production'
        });
    }
    v.src = "https://cdn.voiceflow.com/widget-next/bundle.mjs"; v.type = "text/javascript";
    s.parentNode.insertBefore(v, s);
})(document, 'script');
</script>

</body>
</html>
